<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdultHub - Plataforma de Conteúdo Adulto</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div id="ad-header" style="margin:0 auto;max-width:1200px;padding:8px 16px;text-align:center"></div>

  <div class="container">
    <!-- Hero Banner -->
    <div style="margin:32px 0 40px;padding:48px 44px;background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:space-between;gap:24px;overflow:hidden;position:relative;">
      <div style="position:absolute;right:-80px;top:-80px;width:400px;height:400px;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0.04;border-radius:50%;filter:blur(40px);"></div>
      <div style="position:absolute;left:-60px;bottom:-60px;width:250px;height:250px;background:var(--accent2);opacity:0.03;border-radius:50%;filter:blur(30px);"></div>
      <div style="position:relative;z-index:1;">
        <div style="font-family:var(--font-display);font-size:40px;font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:12px;">
          Conteúdo adulto<br><span style="background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">sem censura.</span>
        </div>
        <p style="color:var(--text2);font-size:15px;margin-bottom:22px;max-width:440px;line-height:1.6;">Vídeos, lives e fórum em um só lugar. Faça upload, interaja e explore.</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="window.location.href='/videos.html'" style="padding:12px 28px;font-size:15px;">▶ Ver vídeos</button>
          <button class="btn btn-ghost" onclick="showModal('register')" style="padding:12px 28px;font-size:15px;">Criar conta grátis</button>
        </div>
      </div>
      <div style="font-size:90px;opacity:0.08;user-select:none;position:relative;z-index:1;transform:rotate(-5deg);">🔥</div>
    </div>

    <!-- Featured / Recent Videos -->
    <div class="page-header" style="padding:0 0 16px;margin-bottom:20px;">
      <h1>Em alta</h1>
    </div>

    <div class="filter-bar">
      <button class="filter-chip active" onclick="loadVideos('popular')">🔥 Populares</button>
      <button class="filter-chip" onclick="loadVideos('newest')">🆕 Recentes</button>
      <button class="filter-chip" onclick="loadVideos('liked')">❤️ Mais curtidos</button>
      <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;" id="category-chips"></div>
    </div>

    <div class="video-grid" id="video-grid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">Carregando...</div>
    </div>

     <div style="text-align:center;margin:32px 0;">
      <button class="btn btn-ghost" id="load-more-btn" onclick="loadMore()" style="display:none">Carregar mais</button>
    </div>
  </div>

  <div id="ad-footer" style="margin:16px auto;max-width:1200px;padding:8px 16px;text-align:center"></div>

  <script src="/js/app.js"></script>
  <script>
    const CATEGORIES = ['Geral','Amateur','Solo','Casal','Grupo','Lésbico','Gay','Trans','BDSM','Fetiche'];
    let currentSort = 'popular';
    let currentCategory = '';
    let currentPage = 1;
    let allVideos = [];

     document.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderCategoryChips();
      loadVideos('popular');
      setTimeout(injectAllAds, 100);
    });

    function renderCategoryChips() {
      const el = document.getElementById('category-chips');
      el.innerHTML = CATEGORIES.map(c =>
        `<button class="filter-chip" onclick="filterCategory('${c}')">${c}</button>`
      ).join('');
    }

    function filterCategory(cat) {
      currentCategory = currentCategory === cat ? '' : cat;
      document.querySelectorAll('#category-chips .filter-chip').forEach(b => {
        b.classList.toggle('active', b.textContent === cat && currentCategory === cat);
      });
      loadVideos(currentSort);
    }

    async function loadVideos(sort) {
      currentSort = sort;
      currentPage = 1;
      document.querySelectorAll('.filter-bar > .filter-chip').forEach(b => {
        b.classList.remove('active');
        if ((sort==='popular'&&b.textContent.includes('Populares'))||
            (sort==='newest'&&b.textContent.includes('Recentes'))||
            (sort==='liked'&&b.textContent.includes('curtidos'))) b.classList.add('active');
      });
      const grid = document.getElementById('video-grid');
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">Carregando...</div>';
      let url = `/api/videos?sort=${sort}&limit=24&page=1`;
      if (currentCategory) url += `&category=${encodeURIComponent(currentCategory)}`;
      try {
        const videos = await API.get(url);
        allVideos = videos;
        renderGrid(videos);
        document.getElementById('load-more-btn').style.display = videos.length === 24 ? 'inline-flex' : 'none';
      } catch(e) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">Erro ao carregar vídeos</div>`;
      }
    }

    async function loadMore() {
      currentPage++;
      let url = `/api/videos?sort=${currentSort}&limit=24&page=${currentPage}`;
      if (currentCategory) url += `&category=${encodeURIComponent(currentCategory)}`;
      const videos = await API.get(url);
      allVideos = [...allVideos, ...videos];
      renderGrid(allVideos);
      document.getElementById('load-more-btn').style.display = videos.length === 24 ? 'inline-flex' : 'none';
    }

    function renderGrid(videos) {
      const grid = document.getElementById('video-grid');
      if (!videos.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.069A1 1 0 0121 8.867v6.266a1 1 0 01-1.447.902L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
            <h3>Nenhum vídeo aqui ainda</h3>
            <p>Seja o primeiro a fazer upload!</p>
          </div>
        `;
        return;
      }
      grid.innerHTML = videos.map(renderVideoCard).join('');
    }
  </script>
</body>
</html>
