<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vídeos - AdultHub.com</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div id="ad-header" style="margin:0 auto;max-width:1200px;padding:8px 16px;text-align:center"></div>
  <div class="container">
    <div class="page-header">
      <h1 id="page-title">Vídeos</h1>
      <p id="page-subtitle">Explore o melhor conteúdo do AdultHub.com</p>
    </div>
    <div class="filter-bar">
      <button class="filter-chip active" data-sort="newest" onclick="setSort('newest',this)">🆕 Recentes</button>
      <button class="filter-chip" data-sort="popular" onclick="setSort('popular',this)">🔥 Populares</button>
      <button class="filter-chip" data-sort="liked" onclick="setSort('liked',this)">❤️ Curtidos</button>
      <select id="cat-select" style="width:auto;padding:6px 12px;border-radius:50px;font-size:13px;margin-left:8px;" onchange="setCategory(this.value)">
        <option value="">Todas as categorias</option>
        <option>Geral</option><option>Amateur</option><option>Solo</option>
        <option>Casal</option><option>Grupo</option><option>Lésbico</option>
        <option>Gay</option><option>Trans</option><option>BDSM</option><option>Fetiche</option>
      </select>
    </div>
    <div class="video-grid" id="video-grid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3)">Carregando...</div>
    </div>
     <div style="text-align:center;margin:32px 0">
      <button class="btn btn-ghost" id="load-more-btn" style="display:none" onclick="loadMore()">Carregar mais</button>
    </div>
  </div>
  <div id="ad-footer" style="margin:16px auto;max-width:1200px;padding:8px 16px;text-align:center"></div>
  <script src="/js/app.js"></script>
  <script>
    let sort = 'newest', category = '', page = 1, videos = [];

    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('videos');
      const params = getParams();
      if (params.search) {
        document.getElementById('page-title').textContent = 'Busca: "' + params.search + '"';
        document.getElementById('page-subtitle').textContent = '';
      }
      if (params.category) {
        category = params.category;
        document.getElementById('cat-select').value = category;
        document.getElementById('page-title').textContent = category;
      }
      loadVideos();
      setTimeout(injectAllAds, 100);
    });

    function setSort(s, btn) {
      sort = s; page = 1;
      document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadVideos();
    }
    function setCategory(c) { category = c; page = 1; loadVideos(); }

    async function loadVideos() {
      const params = getParams();
      let url = `/api/videos?sort=${sort}&limit=24&page=${page}`;
      if (category) url += `&category=${encodeURIComponent(category)}`;
      if (params.search) url += `&search=${encodeURIComponent(params.search)}`;
      try {
        const res = await API.get(url);
        if (page === 1) { videos = res; renderGrid(); }
        else { videos = [...videos, ...res]; renderGrid(); }
        document.getElementById('load-more-btn').style.display = res.length === 24 ? 'inline-flex' : 'none';
      } catch(e) {
        document.getElementById('video-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3)">Erro ao carregar</div>`;
      }
    }

    function loadMore() { page++; loadVideos(); }

    function renderGrid() {
      const grid = document.getElementById('video-grid');
      if (!videos.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.069A1 1 0 0121 8.867v6.266a1 1 0 01-1.447.902L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg><h3>Nenhum vídeo encontrado</h3><p>Tente outros filtros ou faça upload!</p></div>`;
        return;
      }
      grid.innerHTML = videos.map(renderVideoCard).join('');
    }
  </script>
</body>
</html>
