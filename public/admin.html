<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px }
    @media(max-width:900px) { .admin-grid { grid-template-columns:repeat(2,1fr) } }
    .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; text-align:center }
    .stat-card .num { font-size:32px; font-weight:900; color:var(--accent); margin-bottom:4px }
    .stat-card .label { font-size:13px; color:var(--text3); font-weight:600 }

    .admin-tabs { display:flex; gap:8px; margin-bottom:16px; border-bottom:1px solid var(--border); padding-bottom:12px; flex-wrap:wrap }
    .admin-tab { padding:8px 16px; border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer; background:var(--bg2); color:var(--text2); border:1px solid var(--border) }
    .admin-tab.active { background:var(--accent); color:#fff; border-color:var(--accent) }

    .admin-table { width:100%; border-collapse:collapse }
    .admin-table th, .admin-table td { padding:12px 14px; text-align:left; font-size:13px; border-bottom:1px solid var(--border) }
    .admin-table th { font-weight:700; color:var(--text3); background:var(--bg2) }
    .admin-table tr:hover td { background:var(--bg2) }

    .role-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:800; letter-spacing:0.3px }
    .role-admin { background:#ff3d5a20; color:#ff3d5a }
    .role-mod { background:#ffc10720; color:#ffc107 }
    .role-user { background:var(--bg3); color:var(--text3) }

    .ban-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:800; background:#ff3d5a20; color:#ff3d5a }
    .unban-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:800; background:#2ecc7120; color:#2ecc71 }

    .status-pendente { color:var(--warning) }
    .status-resolvido { color:#2ecc71 }
    .status-rejeitado { color:var(--text3) }

    .action-btn { padding:6px 10px; font-size:12px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg2); cursor:pointer; margin-right:6px }
    .action-btn.danger { border-color:#ff3d5a; color:#ff3d5a }
    .action-btn.primary { border-color:var(--accent); color:var(--accent) }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="container" style="max-width:1200px">
    <div id="admin-content" style="margin-top:24px">
      <div style="text-align:center;padding:60px;color:var(--text3)">Carregando...</div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let currentTab = 'dashboard';
    let stats = {};
    let reports = [];
    let users = [];

    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar();
      const user = API.getUser();
      if (!user || (user.role !== 'admin' && user.role !== 'mod')) {
        document.getElementById('admin-content').innerHTML = `
          <div style="text-align:center;padding:80px">
            <div style="font-size:20px;font-weight:700;margin-bottom:12px">Acesso negado</div>
            <div style="color:var(--text3)">Você não tem permissão para acessar esta página.</div>
          </div>`;
        return;
      }
      await loadAll();
    });

    async function loadAll() {
      try {
        stats = await API.get('/api/admin/stats');
        reports = await API.get('/api/admin/reports');
        users = await API.get('/api/admin/users');
        render();
      } catch(e) {
        toast(e.message, 'error');
      }
    }

    function setTab(tab) {
      currentTab = tab;
      render();
    }

    function render() {
      const isAdmin = API.getUser()?.role === 'admin';
      document.getElementById('admin-content').innerHTML = `
        <div style="margin-bottom:20px">
          <h1 style="font-size:24px;font-weight:900">Painel Admin</h1>
          <div style="color:var(--text3);font-size:13px;margin-top:4px">Gerencie usuários, denúncias e conteúdo</div>
        </div>

        <div class="admin-grid">
          <div class="stat-card"><div class="num">${stats.users || 0}</div><div class="label">Usuários</div></div>
          <div class="stat-card"><div class="num">${stats.videos || 0}</div><div class="label">Vídeos</div></div>
          <div class="stat-card"><div class="num">${stats.posts || 0}</div><div class="label">Posts Fórum</div></div>
          <div class="stat-card"><div class="num">${stats.pending_reports || 0}</div><div class="label">Denúncias Pendentes</div></div>
        </div>

        <div class="admin-tabs">
          <div class="admin-tab ${currentTab==='dashboard'?'active':''}" onclick="setTab('dashboard')">Dashboard</div>
          <div class="admin-tab ${currentTab==='reports'?'active':''}" onclick="setTab('reports')">Denúncias (${reports.length})</div>
          <div class="admin-tab ${currentTab==='users'?'active':''}" onclick="setTab('users')">Usuários</div>
        </div>

        ${renderCurrentTab(isAdmin)}
      `;
    }

    function renderCurrentTab(isAdmin) {
      if (currentTab === 'reports') return renderReports();
      if (currentTab === 'users') return renderUsers(isAdmin);
      return renderDashboard();
    }

    function renderDashboard() {
      return `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px">
          <div style="font-weight:700;margin-bottom:16px">Ações Rápidas</div>
          <div style="display:flex;gap:12px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="setTab('reports')">Ver Denúncias</button>
            <button class="btn btn-secondary" onclick="setTab('users')">Gerenciar Usuários</button>
            <button class="btn btn-secondary" onclick="window.location.href='/forum.html'">Ir ao Fórum</button>
            <button class="btn btn-secondary" onclick="window.location.href='/videos.html'">Ir aos Vídeos</button>
          </div>
        </div>
      `;
    }

    function renderReports() {
      if (!reports.length) {
        return `<div style="text-align:center;padding:40px;color:var(--text3)">Nenhuma denúncia pendente</div>`;
      }
      return `
        <table class="admin-table">
          <thead><tr>
            <th>Tipo</th><th>Conteúdo</th><th>Denunciado por</th><th>Motivo</th><th>Status</th><th>Data</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${reports.map(r => `
              <tr>
                <td style="font-weight:700">${r.content_type}</td>
                <td><a href="#" onclick="goToContent('${r.content_type}',${r.content_id})" style="color:var(--accent)">#${r.content_id}</a></td>
                <td>${r.reporter_name}</td>
                <td style="max-width:240px">${r.reason || '-'}</td>
                <td class="status-${r.status}">${r.status}</td>
                <td>${timeAgo(r.created_at)}</td>
                <td>
                  <button class="action-btn primary" onclick="updateReport(${r.id},'resolvido')">Resolver</button>
                  <button class="action-btn" onclick="updateReport(${r.id},'rejeitado')">Rejeitar</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderUsers(isAdmin) {
      if (!users.length) {
        return `<div style="text-align:center;padding:40px;color:var(--text3)">Nenhum usuário encontrado</div>`;
      }
      return `
        <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
          <input id="user-search" type="text" placeholder="Buscar usuário..." style="flex:1;max-width:320px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text)">
          <button class="btn btn-secondary" onclick="searchUsers()">Buscar</button>
        </div>

        <table class="admin-table">
          <thead><tr>
            <th>ID</th><th>Usuário</th><th>Email</th><th>Role</th><th>Status</th><th>Criado</th><th>Último Login</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td style="font-weight:700;color:var(--text3)">${u.id}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="width:28px;height:28px;background:var(--bg4);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);overflow:hidden">
                      ${u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover">` : avatarLetter(u.username)}
                    </div>
                    <a href="/profile.html?u=${u.username}" style="font-weight:700">@${u.username}</a>
                  </div>
                </td>
                <td style="color:var(--text3);font-size:12px">${u.email}</td>
                <td><span class="role-badge role-${u.role}">${u.role}</span></td>
                <td>${u.is_banned ? '<span class="ban-badge">Banido</span>' : '<span class="unban-badge">Ativo</span>'}</td>
                <td>${timeAgo(u.created_at)}</td>
                <td>${u.last_login ? timeAgo(u.last_login) : '-'}</td>
                <td>
                  ${isAdmin ? `
                    <select class="action-btn" onchange="changeRole(${u.id}, this.value)">
                      <option value="user" ${u.role==='user'?'selected':''}>user</option>
                      <option value="mod" ${u.role==='mod'?'selected':''}>mod</option>
                      <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
                    </select>
                  ` : ''}
                  ${u.is_banned ?
                    `<button class="action-btn primary" onclick="toggleBan(${u.id}, false, '')">Desbanir</button>` :
                    `<button class="action-btn danger" onclick="promptBan(${u.id})">Banir</button>`
                  }
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function goToContent(type, id) {
      if (type === 'video') window.location.href = '/watch.html?id=' + id;
      else if (type === 'post') window.location.href = '/forum-post.html?id=' + id;
      else if (type === 'reply') window.location.href = '/forum-post.html?id=' + id;
    }

    async function updateReport(id, status) {
      try {
        await API.put('/api/admin/reports/' + id, { status });
        toast('Denúncia atualizada', 'success');
        await loadAll();
      } catch(e) { toast(e.message, 'error'); }
    }

    async function changeRole(id, role) {
      try {
        await API.put('/api/admin/users/' + id + '/role', { role });
        toast('Role atualizada', 'success');
        await loadAll();
      } catch(e) { toast(e.message, 'error'); }
    }

    async function toggleBan(id, banned, reason) {
      try {
        await API.put('/api/admin/users/' + id + '/ban', { banned, reason });
        toast(banned ? 'Usuário banido' : 'Usuário desbanido', 'success');
        await loadAll();
      } catch(e) { toast(e.message, 'error'); }
    }

    function promptBan(id) {
      showModal({
        title: 'Banir Usuário',
        content: `<div class="form-group"><label>Motivo do banimento (opcional)</label><textarea id="ban-reason-input" style="min-height:80px" placeholder="Descreva o motivo..."></textarea></div>`,
        confirmText: 'Banir',
        cancelText: 'Cancelar',
        onConfirm: () => {
          const reason = document.getElementById('ban-reason-input')?.value?.trim() || '';
          toggleBan(id, true, reason);
        }
      });
    }

    async function searchUsers() {
      const q = document.getElementById('user-search')?.value?.trim();
      try {
        users = await API.get('/api/admin/users' + (q ? '?search=' + encodeURIComponent(q) : ''));
        render();
      } catch(e) { toast(e.message, 'error'); }
    }
  </script>
</body>
</html>
